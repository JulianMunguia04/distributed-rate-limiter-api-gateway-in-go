apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-backend-1
  namespace: api-gateway
  labels:
    app: app1
    instance: backend-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
      instance: backend-1
  template:
    metadata:
      labels:
        app: app1
        instance: backend-1
    spec:
      containers:
      - name: app1-backend
        image: microservice:latest
        imagePullPolicy: IfNotPresent
        args: ["5000", "1"]
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
---
